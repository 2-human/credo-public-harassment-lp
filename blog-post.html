<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Credo Legal — Blog</title>
<style>
  :root{ --red:#c92028; --ink:#1a1d23; --muted:#6b7280; --line:#e6e8ec; --bg:#f7f8fa; }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font:16px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:#25292f; background:#fff}
  a{color:inherit}
  .topbar{position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:14px; height:54px; padding:0 20px;
    background:#fff; border-bottom:1px solid var(--line)}
  .topbar .back{display:flex; align-items:center; gap:9px; font-weight:700; font-size:14px; text-decoration:none}
  .topbar .back img{height:22px; display:block}
  .spacer{flex:1}
  .viewlink{font-size:12.5px; color:var(--red); text-decoration:none; border:1px solid #f2c9cb; padding:6px 11px; border-radius:7px; background:#fff4f4; font-weight:600}
  .viewlink:hover{background:#ffe9ea}
  main{max-width:720px; margin:0 auto; padding:34px 24px 100px}
  .kicker{font-size:11.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--red); margin-bottom:8px}
  h1.title{font-size:32px; font-weight:800; letter-spacing:-.02em; line-height:1.18; margin:0 0 26px}
  .article{font-size:16.5px; line-height:1.72}
  .article h1{font-size:24px; margin:34px 0 12px; line-height:1.25}
  .article h2{font-size:21px; font-weight:700; margin:32px 0 10px; line-height:1.3; letter-spacing:-.01em}
  .article h3{font-size:17px; font-weight:700; margin:24px 0 7px}
  .article p{margin:0 0 17px}
  .article ul,.article ol{margin:0 0 17px; padding-left:24px}
  .article li{margin:5px 0}
  .article a{color:var(--red); text-decoration:underline; text-underline-offset:2px}
  .article strong{font-weight:700}
  .article blockquote{margin:0 0 18px; padding:8px 18px; border-left:3px solid var(--line); color:#4a4f57; font-style:italic}
  .article hr{border:none; border-top:1px solid var(--line); margin:30px 0}
  .article code{background:var(--bg); border:1px solid var(--line); border-radius:4px; padding:1px 5px; font-size:.9em}
  .article table{border-collapse:collapse; width:100%; margin:8px 0 20px; font-size:15px; display:block; overflow-x:auto}
  .article th,.article td{border:1px solid var(--line); padding:9px 11px; text-align:left; vertical-align:top}
  .article th{background:var(--bg); font-weight:700}
  .missing{color:var(--muted); text-align:center; padding:80px 20px}
</style>

<div id="hub-header" data-page="blog-post" data-hub="lp"></div>
<script src="hub-header.js"></script>
<div style="display:flex;justify-content:flex-end;padding:8px 20px;border-bottom:1px solid #eceef0;background:#fff">
  <a class="viewlink" id="viewlink" href="#" target="_blank" rel="noopener" style="display:none">View live ↗</a>
</div>

<main id="main"><div class="missing">Loading…</div></main>

<script src="blog-content.js"></script>
<script>
(function () {
  var BLOG = window.CREDO_BLOG || {};
  var slug = new URLSearchParams(location.search).get('slug');
  var rec = slug && BLOG[slug];
  var $main = document.getElementById('main');
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  if(!rec){
    $main.innerHTML = '<div class="missing">Article not found.<br><a href="blog.html" style="color:var(--red)">← Back to the blog</a></div>';
    return;
  }
  document.title = 'Credo Legal — ' + rec.title;
  var hbHere = document.querySelector('#hub-header .hh-here'); // breadcrumb leaf → the article title
  if (hbHere) hbHere.textContent = rec.title;
  var vl = document.getElementById('viewlink');
  vl.href = rec.link; vl.style.display = '';
  $main.innerHTML =
    '<div class="kicker">' + esc(rec.pillarLabel || rec.pillar) + '</div>' +
    '<h1 class="title">' + esc(rec.title) + '</h1>' +
    '<article class="article">' + rec.html + '</article>';
})();
</script>
