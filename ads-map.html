/* Campaign display order + friendly labels. */
const CAMP_ORDER = ["S_All-States","S_Harassment_NW","S_Lawsuit_NW","S_CreditCard_NW","S_Garnishment_NW"];
const CAMP_LABEL = {
  "S_All-States": "All-States", "S_Harassment_NW": "Harassment", "S_Lawsuit_NW": "Lawsuit",
  "S_CreditCard_NW": "Credit Card", "S_Garnishment_NW": "Garnishment"
};

const $main = document.getElementById('main');
const $q = document.getElementById('q');
let campFilter = 'all', stateFilter = 'all', allOpen = false;
const openKeys = new Set();  // preserves per-ad expand state across re-renders

const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const key = (ad, i) => ad.finalUrl + '#' + i;

/* Header stats reflect the full dataset (not the filtered view). */
function paintStats() {
  document.getElementById('s-ads').textContent = ADS.length;
  document.getElementById('s-camps').textContent = new Set(ADS.map(a => a.campaign)).size;
  document.getElementById('s-urls').textContent = new Set(ADS.map(a => a.finalUrl)).size;
  document.getElementById('s-enabled').textContent = ADS.filter(a => a.state === 'Enabled').length;
  document.getElementById('s-paused').textContent = ADS.filter(a => a.state === 'Paused').length;
}

function paintCampChips() {
  const box = document.getElementById('camp-chips');
  const mk = (val, label, n) => `<button class="chip camp ${val===campFilter?'active':''}" data-camp="${val}">${label}${n!=null?` · ${n}`:''}</button>`;
  let html = mk('all', 'All campaigns', ADS.length);
  CAMP_ORDER.forEach(c => { const n = ADS.filter(a => a.campaign === c).length; if (n) html += mk(c, CAMP_LABEL[c] || c, n); });
  box.innerHTML = html;
}

function matches(ad, q) {
  if (!q) return true;
  const hay = [ad.campaign, ad.adGroup, ad.finalUrl, ...(ad.headlines||[]), ...(ad.descriptions||[])].join(' ').toLowerCase();
  return hay.includes(q);
}

function render() {
  const q = $q.value.trim().toLowerCase();
  $main.innerHTML = '';
  let shown = 0;
  CAMP_ORDER.forEach(camp => {
    if (campFilter !== 'all' && campFilter !== camp) return;
    const ads = ADS.map((a, i) => ({a, i}))
      .filter(({a}) => a.campaign === camp)
      .filter(({a}) => stateFilter === 'all' || a.state === stateFilter)
      .filter(({a}) => matches(a, q));
    if (!ads.length) return;
    const h = document.createElement('div');
    h.className = 'camp-h';
    h.innerHTML = `<span class="name">${CAMP_LABEL[camp] || camp}</span><span class="code mono">${camp}</span><span class="count">${ads.length} ad${ads.length>1?'s':''}</span>`;
    $main.appendChild(h);
    ads.forEach(({a, i}) => { $main.appendChild(adCard(a, i)); shown++; });
  });
  if (!shown) $main.innerHTML = '<div class="empty">No ads match the current filters.</div>';
}

function adCard(ad, i) {
  const k = key(ad, i);
  const isOpen = allOpen || openKeys.has(k);
  const el = document.createElement('div');
  el.className = 'ad ' + (ad.state === 'Enabled' ? 'enabled' : 'paused') + (isOpen ? ' open' : '');
  const disp = (ad.path1 || ad.path2) ? `<span class="disp">/${esc(ad.path1||'')}${ad.path2?'/'+esc(ad.path2):''}</span>` : '';
  el.innerHTML = `
    <div class="ad-head">
      <span class="ad-group">${esc(ad.adGroup)}</span>
      <span class="pill ${ad.state==='Enabled'?'enabled':'paused'}">${esc(ad.state)}</span>
      <span class="ad-type">RSA</span>
      <span class="url-wrap">
        ${disp}
        <a class="final-url" href="${esc(ad.finalUrl)}" target="_blank" rel="noopener" title="Open live landing page">${esc(ad.finalUrl.replace('https://',''))} ↗</a>
        <span class="toggle"><span class="car">▸</span> ${ad.headlines.length} headlines · ${ad.descriptions.length} desc</span>
      </span>
    </div>
    <div class="ad-body">
      <div class="grid">
        <div class="col">
          <h4>Headlines (${ad.headlines.length})</h4>
          <ol class="hl">${ad.headlines.map(h => `<li>${esc(h)}</li>`).join('')}</ol>
        </div>
        <div class="col">
          <h4>Descriptions (${ad.descriptions.length})</h4>
          <ul class="ds">${ad.descriptions.map(d => `<li>${esc(d)}</li>`).join('')}</ul>
        </div>
      </div>
    </div>`;
  // Toggle expand on header click, except when the actual URL link is clicked.
  el.querySelector('.ad-head').addEventListener('click', e => {
    if (e.target.closest('a.final-url')) return;
    if (openKeys.has(k)) openKeys.delete(k); else openKeys.add(k);
    el.classList.toggle('open');
  });
  return el;
}

/* Filter wiring */
document.getElementById('camp-chips').addEventListener('click', e => {
  const b = e.target.closest('button[data-camp]'); if (!b) return;
  campFilter = b.dataset.camp; paintCampChips(); render();
});
document.getElementById('state-chips').addEventListener('click', e => {
  const b = e.target.closest('button[data-state]'); if (!b) return;
  stateFilter = b.dataset.state;
  document.querySelectorAll('#state-chips .chip').forEach(c => c.classList.toggle('active', c === b));
  render();
});
$q.addEventListener('input', render);
document.getElementById('toggle-all').addEventListener('click', e => {
  allOpen = !allOpen;
  if (!allOpen) openKeys.clear();
  e.target.textContent = allOpen ? 'Collapse all' : 'Expand all';
  render();
});

paintStats();
paintCampChips();
render();
</script>
</body>
</html>
