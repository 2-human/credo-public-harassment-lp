const $main = document.getElementById('main');
const $q = document.getElementById('q');
let campFilter = 'all', stateFilter = 'all', source = 'google', allExpanded = false, forceOpen = false;
/* Per-level expand state, preserved across re-renders (source toggle, filters). */
const openCamp = new Set(), openGrp = new Set(), openAd = new Set();

const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const grpKey = (camp, ag) => camp + '␀' + ag;
const toggleSet = (set, k) => { set.has(k) ? set.delete(k) : set.add(k); };

/* UTM values by hierarchy level — match the resolved SUFFIXES exactly:
   campaign → utm_campaign, ad group → utm_term. */
const campUtm = camp => camp.replace(/-/g, '_') + '_2025';
const termUtm = ag => ag.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');

/* Final URL + resolved tracking suffix for the current source. Bing is the
   Google suffix with only utm_source swapped (same campaign structure). */
const trackedUrl = (ad, i) => ad.finalUrl + '?' + (source === 'bing'
  ? SUFFIXES[i].replace('utm_source=google', 'utm_source=bing')
  : SUFFIXES[i]);

/* Header stats reflect the full dataset for the active channel, not the filtered view. */
const statCell = (n, l) => `<div class="stat"><b>${n}</b><span>${l}</span></div>`;
function paintStats() {
  const box = document.getElementById('stats-row');
  if (source === 'meta') {
    box.innerHTML =
      statCell(META_ADS.length, 'ads') +
      statCell(1, 'campaign') +
      statCell(new Set(META_ADS.map(a => a.adSet)).size, 'ad sets') +
      statCell(new Set(META_ADS.map(a => a.finalUrl)).size, 'landing pages') +
      statCell(META_ADS.filter(a => a.hub != null).length, 'in hub');
  } else {
    box.innerHTML =
      statCell(ADS.length, 'ads') +
      statCell(new Set(ADS.map(a => a.campaign)).size, 'campaigns') +
      statCell(new Set(ADS.map(a => a.finalUrl)).size, 'landing pages') +
      statCell(ADS.filter(a => a.state === 'Enabled').length, 'enabled') +
      statCell(ADS.filter(a => a.state === 'Paused').length, 'paused') +
      statCell(MATCH.filter(m => m.hub != null).length, 'in hub');
  }
}

function paintCampChips() {
  const box = document.getElementById('camp-chips');
  const mk = (val, label, n) => `<button class="chip ${val===campFilter?'active':''}" data-camp="${val}">${label}${n!=null?` · ${n}`:''}</button>`;
  let html = mk('all', 'All campaigns', ADS.length);
  CAMP_ORDER.forEach(c => { const n = ADS.filter(a => a.campaign === c).length; if (n) html += mk(c, CAMP_LABEL[c] || c, n); });
  box.innerHTML = html;
}

function matches(ad, i, q) {
  if (!q) return true;
  const hay = [ad.campaign, ad.adGroup, ad.finalUrl, MATCH[i].name, ...(ad.headlines||[]), ...(ad.descriptions||[])].join(' ').toLowerCase();
  return hay.includes(q);
}

function render() {
  const q = $q.value.trim().toLowerCase();
  forceOpen = q.length > 0;   // a search auto-expands the matching path
  $main.innerHTML = '';
  if (source === 'meta') { renderMeta(q); return; }
  let shown = 0;
  CAMP_ORDER.forEach(camp => {
    if (campFilter !== 'all' && campFilter !== camp) return;
    const items = ADS.map((a, i) => ({a, i}))
      .filter(({a}) => a.campaign === camp)
      .filter(({a}) => stateFilter === 'all' || a.state === stateFilter)
      .filter(({a, i}) => matches(a, i, q));
    if (!items.length) return;
    // group ads by ad group, preserving first-seen order
    const order = [], byGroup = new Map();
    items.forEach(it => {
      if (!byGroup.has(it.a.adGroup)) { byGroup.set(it.a.adGroup, []); order.push(it.a.adGroup); }
      byGroup.get(it.a.adGroup).push(it);
    });
    $main.appendChild(campNode(camp, order, byGroup));
    shown += items.length;
  });
  if (!shown) $main.innerHTML = '<div class="empty">No ads match the current filters.</div>';
}

/* Level 1 — campaign (carries utm_campaign) */
function campNode(camp, groups, byGroup) {
  const open = forceOpen || openCamp.has(camp);
  const nAds = groups.reduce((s, ag) => s + byGroup.get(ag).length, 0);
  const el = document.createElement('div');
  el.className = 'camp' + (open ? ' open' : '');
  el.innerHTML = `
    <div class="camp-head">
      <span class="car">▸</span>
      <span class="camp-name">${esc(CAMP_LABEL[camp] || camp)}</span>
      <span class="camp-code mono">${esc(camp)}</span>
      <span class="utm">utm_campaign=${esc(campUtm(camp))}</span>
      <span class="node-count">${groups.length} ad group${groups.length>1?'s':''} · ${nAds} ad${nAds>1?'s':''}</span>
    </div>
    <div class="camp-body"></div>`;
  const body = el.querySelector('.camp-body');
  groups.forEach(ag => body.appendChild(grpNode(camp, ag, byGroup.get(ag))));
  el.querySelector('.camp-head').addEventListener('click', () => {
    toggleSet(openCamp, camp); el.classList.toggle('open');
  });
  return el;
}

/* Level 2 — ad group (carries utm_term) */
function grpNode(camp, ag, items) {
  const gk = grpKey(camp, ag);
  const open = forceOpen || openGrp.has(gk);
  const el = document.createElement('div');
  el.className = 'grp' + (open ? ' open' : '');
  el.innerHTML = `
    <div class="grp-head">
      <span class="car">▸</span>
      <span class="grp-name">${esc(ag)}</span>
      <span class="utm">utm_term=${esc(termUtm(ag))}</span>
      <span class="node-count">${items.length} ad${items.length>1?'s':''}</span>
    </div>
    <div class="grp-body"></div>`;
  const body = el.querySelector('.grp-body');
  items.forEach(({a, i}) => body.appendChild(adNode(a, i)));
  el.querySelector('.grp-head').addEventListener('click', () => {
    toggleSet(openGrp, gk); el.classList.toggle('open');
  });
  return el;
}

/* Level 3 — individual ad: its final URL + resolved tracking suffix */
function adNode(ad, i) {
  const open = forceOpen || openAd.has(i);
  const turl = trackedUrl(ad, i);
  const slug = ad.finalUrl.replace('https://start.credolegal.com', '');
  const m = MATCH[i];
  const hubTag = m.hub != null
    ? `<a class="hub-link" href="review.html#${m.hub}" target="_blank" rel="noopener" title="Open “${esc(m.name)}” in the LP review hub">In hub ↗</a>`
    : `<span class="nohub" title="This final URL is not one of the review hub's 32 LP variants">no hub page</span>`;
  const el = document.createElement('div');
  el.dataset.i = i;
  el.className = 'adx ' + (ad.state === 'Enabled' ? 'enabled' : 'paused') + (open ? ' open' : '');
  el.innerHTML = `
    <div class="adx-head">
      <span class="car">▸</span>
      <span class="pill ${ad.state==='Enabled'?'enabled':'paused'}">${esc(ad.state)}</span>
      <span class="ad-name">${esc(m.name)}</span>
      <a class="final-url" href="${esc(ad.finalUrl)}" target="_blank" rel="noopener" title="Open live landing page">${esc(slug)} ↗</a>
      ${hubTag}
      <span class="adx-meta">${ad.headlines.length} HL · ${ad.descriptions.length} desc</span>
      <button class="copy-btn mini" data-copy="${esc(turl)}" title="Copy ${source} tracking URL">Copy URL</button>
    </div>
    <div class="adx-body">
      <div class="track">
        <h4>Final URL + tracking suffix · <span class="src-tag">${source}</span></h4>
        <div class="track-row">
          <div class="track-url">${esc(turl)}</div>
          <button class="copy-btn" data-copy="${esc(turl)}">Copy</button>
        </div>
      </div>
      <div class="grid">
        <div class="col">
          <h4>Headlines (${ad.headlines.length})</h4>
          <ol class="hl">${ad.headlines.map(h => `<li>${esc(h)}</li>`).join('')}</ol>
        </div>
        <div class="col">
          <h4>Descriptions (${ad.descriptions.length})</h4>
          <ul class="ds">${ad.descriptions.map(d => `<li>${esc(d)}</li>`).join('')}</ul>
        </div>
      </div>
    </div>`;
  el.querySelector('.adx-head').addEventListener('click', e => {
    if (e.target.closest('a') || e.target.closest('.copy-btn')) return;
    toggleSet(openAd, i); el.classList.toggle('open');
  });
  return el;
}

/* ───── Meta view: one campaign › ad sets › ads ───── */
function metaMatches(a, q) {
  if (!q) return true;
  const hay = [a.adSet, a.ad, a.topic, a.finalUrl, a.name, a.description,
    ...a.messages.map(m => m.v), ...META_HEADLINES].join(' ').toLowerCase();
  return hay.includes(q);
}

function renderMeta(q) {
  const items = META_ADS.map((a, i) => ({a, i})).filter(({a}) => metaMatches(a, q));
  if (!items.length) { $main.innerHTML = '<div class="empty">No ads match the current search.</div>'; return; }
  $main.appendChild(metaCampNode(items));
}

/* Level 1 — the single Meta campaign (carries utm_source + utm_campaign) */
function metaCampNode(items) {
  const open = forceOpen || openCamp.has('META');
  const order = [], bySet = new Map();
  items.forEach(it => {
    if (!bySet.has(it.a.adSet)) { bySet.set(it.a.adSet, []); order.push(it.a.adSet); }
    bySet.get(it.a.adSet).push(it);
  });
  const el = document.createElement('div');
  el.className = 'camp' + (open ? ' open' : '');
  el.innerHTML = `
    <div class="camp-head">
      <span class="car">▸</span>
      <span class="camp-name">${esc(META_CAMPAIGN.label)}</span>
      <span class="camp-code mono">${esc(META_CAMPAIGN.name)}</span>
      <span class="utm">utm_source=meta · utm_campaign=${esc(META_CAMPAIGN.utmCampaign)}</span>
      <span class="node-count">${order.length} ad set${order.length>1?'s':''} · ${items.length} ad${items.length>1?'s':''}</span>
    </div>
    <div class="camp-body"></div>`;
  const body = el.querySelector('.camp-body');
  order.forEach(set => body.appendChild(metaSetNode(set, bySet.get(set))));
  el.querySelector('.camp-head').addEventListener('click', () => {
    toggleSet(openCamp, 'META'); el.classList.toggle('open');
  });
  return el;
}

/* Level 2 — ad set (Meta groups by debt/service type, not a UTM param) */
function metaSetNode(setName, items) {
  const gk = 'META ' + setName;
  const open = forceOpen || openGrp.has(gk);
  const el = document.createElement('div');
  el.className = 'grp' + (open ? ' open' : '');
  el.innerHTML = `
    <div class="grp-head">
      <span class="car">▸</span>
      <span class="grp-name">${esc(setName)}</span>
      <span class="utm">${esc(items[0].a.adSetCode)}</span>
      <span class="node-count">${items.length} ad${items.length>1?'s':''}</span>
    </div>
    <div class="grp-body"></div>`;
  const body = el.querySelector('.grp-body');
  items.forEach(({a, i}) => body.appendChild(metaAdNode(a, i)));
  el.querySelector('.grp-head').addEventListener('click', () => {
    toggleSet(openGrp, gk); el.classList.toggle('open');
  });
  return el;
}

/* Level 3 — individual Meta ad: final URL + suffix (utm_content = ad), copy + hub link */
function metaAdNode(a, i) {
  const ok = 'm' + i;
  const open = forceOpen || openAd.has(ok);
  const turl = a.finalUrl + '?' + a.suffix;
  const slug = a.finalUrl.replace('https://start.credolegal.com', '');
  const hubTag = a.hub != null
    ? `<a class="hub-link" href="review.html#${a.hub}" target="_blank" rel="noopener" title="Open “${esc(a.name)}” in the LP review hub">In hub ↗</a>`
    : `<span class="nohub">no hub page</span>`;
  const el = document.createElement('div');
  el.className = 'adx meta' + (open ? ' open' : '');
  el.innerHTML = `
    <div class="adx-head">
      <span class="car">▸</span>
      <span class="adkey">${esc(a.ad)}</span>
      <span class="ad-name">${esc(a.name)}</span>
      <a class="final-url" href="${esc(a.finalUrl)}" target="_blank" rel="noopener" title="Open live landing page">${esc(slug)} ↗</a>
      ${hubTag}
      <span class="adx-meta">${a.messages.length} msg · ${META_HEADLINES.length} HL</span>
      <button class="copy-btn mini" data-copy="${esc(turl)}" title="Copy Meta tracking URL">Copy URL</button>
    </div>
    <div class="adx-body">
      <div class="track">
        <h4>Final URL + tracking suffix · <span class="src-tag">meta</span> · utm_content=${esc(a.ad)}</h4>
        <div class="track-row">
          <div class="track-url">${esc(turl)}</div>
          <button class="copy-btn" data-copy="${esc(turl)}">Copy</button>
        </div>
      </div>
      <div class="grid">
        <div class="col">
          <h4>Messages (${a.messages.length})</h4>
          <ul class="ds">${a.messages.map(m => `<li><b>${esc(m.k)}.</b> ${esc(m.v)}</li>`).join('')}</ul>
        </div>
        <div class="col">
          <h4>Headlines (${META_HEADLINES.length}, shared)</h4>
          <ol class="hl">${META_HEADLINES.map(h => `<li>${esc(h)}</li>`).join('')}</ol>
          <h4 style="margin-top:14px;">Angle · description</h4>
          <ul class="ds"><li>${esc(a.topic)} — ${esc(a.description)}</li></ul>
        </div>
      </div>
      <div style="margin-top:12px; font-size:11px; color:#8590a0;">CTA: Book Now · compliance footer appended to every message: “${esc(META_FOOTER)}”</div>
    </div>`;
  el.querySelector('.adx-head').addEventListener('click', e => {
    if (e.target.closest('a') || e.target.closest('.copy-btn')) return;
    toggleSet(openAd, ok); el.classList.toggle('open');
  });
  return el;
}

/* Filter wiring */
document.getElementById('camp-chips').addEventListener('click', e => {
  const b = e.target.closest('button[data-camp]'); if (!b) return;
  campFilter = b.dataset.camp; paintCampChips(); render();
});
document.getElementById('state-chips').addEventListener('click', e => {
  const b = e.target.closest('button[data-state]'); if (!b) return;
  stateFilter = b.dataset.state;
  document.querySelectorAll('#state-chips .chip').forEach(c => c.classList.toggle('active', c === b));
  render();
});
$q.addEventListener('input', render);
document.getElementById('toggle-all').addEventListener('click', e => {
  allExpanded = !allExpanded;
  openCamp.clear(); openGrp.clear(); openAd.clear();
  if (allExpanded) {
    if (source === 'meta') {
      openCamp.add('META');
      META_ADS.forEach((a, i) => { openGrp.add('META ' + a.adSet); openAd.add('m' + i); });
    } else {
      CAMP_ORDER.forEach(c => openCamp.add(c));
      ADS.forEach((a, i) => { openGrp.add(grpKey(a.campaign, a.adGroup)); openAd.add(i); });
    }
  }
  e.target.textContent = allExpanded ? 'Collapse all' : 'Expand all';
  render();
});
document.getElementById('srctog').addEventListener('click', e => {
  const b = e.target.closest('button[data-src]'); if (!b) return;
  source = b.dataset.src;
  document.querySelectorAll('#srctog button').forEach(x => x.classList.toggle('active', x === b));
  // The campaign/state filters are search-ad only; Meta has one campaign + no per-ad state.
  document.getElementById('filters-row').style.display = (source === 'meta') ? 'none' : '';
  paintStats();
  render();
});
/* Click-to-copy on any tracking URL (header 'Copy URL' or the block's 'Copy'). */
$main.addEventListener('click', async e => {
  const btn = e.target.closest('.copy-btn'); if (!btn) return;
  e.stopPropagation();
  const text = btn.dataset.copy;
  try {
    await navigator.clipboard.writeText(text);
  } catch (_) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e2) {}
    ta.remove();
  }
  const label = btn.textContent;
  btn.textContent = 'Copied!'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = label; btn.classList.remove('copied'); }, 1200);
});

paintStats();
paintCampChips();
render();

/* Deep link: the review hub links here as ads-map.html#ad-<i> to focus one ad.
   Open that ad's campaign › ad group › ad path and scroll it into view. */
function focusAd() {
  const m = (location.hash || '').match(/^#ad-(\d+)$/);
  if (!m) return;
  const i = parseInt(m[1], 10);
  const ad = ADS[i]; if (!ad) return;
  if (source === 'meta') {   // #ad-N is a search ad — leave the Meta tab
    source = 'google';
    document.querySelectorAll('#srctog button').forEach(x => x.classList.toggle('active', x.dataset.src === 'google'));
    document.getElementById('filters-row').style.display = '';
    paintStats();
  }
  campFilter = 'all'; stateFilter = 'all'; $q.value = '';
  document.querySelectorAll('#state-chips .chip').forEach(c => c.classList.toggle('active', c.dataset.state === 'all'));
  openCamp.add(ad.campaign);
  openGrp.add(grpKey(ad.campaign, ad.adGroup));
  openAd.add(i);
  paintCampChips();
  render();
  const el = $main.querySelector('.adx[data-i="' + i + '"]');
  if (el) el.scrollIntoView({ block: 'center' });
}
focusAd();
window.addEventListener('hashchange', focusAd);
</script>
</body>
